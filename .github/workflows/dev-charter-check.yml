name: Dev Charter

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/dev-charter-check.yml"
      - "docs/dev-charter/VERSION"
  schedule:
    - cron: "37 2 * * 4"  # Every Thu 02:37 UTC
  workflow_dispatch:

jobs:
  check:
    uses: y-marui/dev-charter/.github/workflows/check-charter.yml@main
    with:
      prefix: docs/dev-charter
    permissions:
      contents: write
      pull-requests: write
