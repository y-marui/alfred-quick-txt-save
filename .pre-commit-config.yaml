repos:
  # Ruff: fast linter + formatter (replaces flake8, isort, pyupgrade, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # General file hygiene + security basics
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # allow custom tags in GitHub Actions YAML
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: scripts/.*\.sh$

  # Secret scanning — uses .gitleaks.toml for project-specific rules
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: [--config=.gitleaks.toml]

  # Block .env files from being committed (.env.example / .env.sample / .env.template are allowed)
  - repo: local
    hooks:
      - id: detect-dotenv
        name: Block .env files
        language: fail
        entry: '.env ファイルはコミット禁止。ダミー値のみの .env.example を使うこと。'
        files: '(^|/)\.env(\.[^.]+)?$'
        exclude: '(^|/)\.env\.(example|sample|template)$'

  # Block hardcoded local absolute paths
  - repo: local
    hooks:
      - id: no-hardcoded-local-paths
        name: Block hardcoded local absolute paths
        language: pygrep
        entry: '(/Users/[A-Za-z0-9_.-]+/|/home/[A-Za-z0-9_.-]+/|C:\\Users\\)'
        types_or: [text]
        exclude: |
          (?x)(
            \.md$|
            docs/|
            \.github/|
            \.gitleaks\.toml$|
            \.pre-commit-config\.yaml$
          )

  # Type checking (runs mypy against src/)
  # language: python → pre-commit manages its own isolated venv for mypy,
  # so it works regardless of whether the project uses uv or global pip.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: python
        entry: mypy
        args: [src]
        types: [python]
        pass_filenames: false
        additional_dependencies: ["mypy>=1.9"]
